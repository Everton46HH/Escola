<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <div>
        <h1>
            Calculadora
        </h1>
        <form id="form">
            
            <p>Digite o primeiro valor:</p>
            <input id="n1" type="number">
            
            <p>Digite o segundo valor:</p>
            <input id="n2">
            
            <p>Digite a operação:</p>
            <input id="operacao">

            <input type="submit">

        </form>
        <h1>Resultado:</h1>
        <p id="resultado"></p>
    </div>
    <script>
        document.getElementById("form").addEventListener('submit' , (event)=>{
            event.preventDefault(); 
                let n1 = document.getElementById("n1").value
                let n2 = document.getElementById("n2").value
                let resultado
                let operacao = String(document.getElementById("operacao").value)
                
                if(operacao=="*"){
                    resultado = n1 * n2
                }
                else if(operacao=="/"){
                    resultado = n1 / n2
                }
                else if(operacao=="+"){
                    resultado = n1 + n2
                }
                else if(operacao=="-"){
                    resultado = n1 - n2
                }
                else{
                    alert("Operacao invalida")
                }
                document.getElementById("resultado").innerHTML = resultado
        })
    </script>
</body>
</html>
